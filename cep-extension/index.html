<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>CreativeClaw Bridge</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 12px; font-size: 12px; }
    h1 { font-size: 13px; color: #7c83fd; margin-bottom: 8px; }
    .status { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #555; flex-shrink: 0; }
    .dot.connected { background: #4ade80; }
    .dot.error { background: #f87171; }
    label { color: #888; font-size: 10px; display: block; margin-bottom: 2px; }
    input { width: 100%; padding: 4px 6px; background: #0d1117; border: 1px solid #30363d; color: #e0e0e0; border-radius: 4px; font-size: 11px; margin-bottom: 8px; }
    button { background: #7c83fd; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; width: 100%; margin-bottom: 6px; }
    button:hover { background: #6366f1; }
    button.danger { background: #374151; }
    .log { font-size: 10px; color: #6b7280; margin-top: 8px; max-height: 60px; overflow-y: auto; }
    .log div { padding: 1px 0; border-bottom: 1px solid #1f2937; }
    .log .ok { color: #4ade80; }
    .log .err { color: #f87171; }
  </style>
</head>
<body>
  <h1>🎬 CreativeClaw Bridge</h1>

  <div class="status">
    <div class="dot" id="dot"></div>
    <span id="statusText">Disconnected</span>
  </div>

  <label>Gateway URL</label>
  <input id="gatewayUrl" type="text" value="ws://127.0.0.1:3789/ws/local" placeholder="ws://127.0.0.1:3789/ws/local"/>

  <button id="connectBtn" onclick="toggleConnect()">Connect</button>
  <button class="danger" onclick="clearLog()">Clear Log</button>

  <div class="log" id="log"></div>

  <script src="js/CSInterface.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
